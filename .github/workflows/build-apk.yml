name: Build GoLike Bot v9 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      run: |
        set -e
        ANDROID_SDK_ROOT="$HOME/android-sdk"
        mkdir -p "$ANDROID_SDK_ROOT/cmdline-tools"
        cd /tmp

        # Try multiple versions of cmdline-tools
        DOWNLOADED=false
        for VER in 11076708 10406996 9477386; do
          URL="https://dl.google.com/android/repository/commandlinetools-linux-${VER}_latest.zip"
          echo "Trying: $URL"
          if wget -q --timeout=60 "$URL" -O cmdline-tools.zip 2>/dev/null; then
            DOWNLOADED=true
            break
          fi
        done

        if [ "$DOWNLOADED" = "false" ]; then
          echo "ERROR: Could not download Android command-line tools"
          exit 1
        fi

        unzip -q cmdline-tools.zip
        mv cmdline-tools "$ANDROID_SDK_ROOT/cmdline-tools/latest"

        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "ANDROID_HOME=$ANDROID_SDK_ROOT"      >> $GITHUB_ENV
        echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/build-tools/34.0.0"       >> $GITHUB_PATH
        echo "$ANDROID_SDK_ROOT/platform-tools"            >> $GITHUB_PATH

        yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses \
          > /dev/null 2>&1 || true

        "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
          "platforms;android-35" \
          "build-tools;34.0.0" \
          "platform-tools" \
          > /dev/null 2>&1

        echo "Android SDK setup complete"
        ls "$ANDROID_SDK_ROOT/platforms/"

    - name: Generate App Icons (Python)
      run: |
        pip install Pillow --quiet
        python3 - << 'PYEOF'
import os, sys
from PIL import Image, ImageDraw

densities = {
    'mdpi': 48, 'hdpi': 72, 'xhdpi': 96,
    'xxhdpi': 144, 'xxxhdpi': 192
}

for density, sz in densities.items():
    d = f'app/src/main/res/mipmap-{density}'
    os.makedirs(d, exist_ok=True)

    # Create a round icon with GoLike red background
    img = Image.new('RGBA', (sz, sz), (0, 0, 0, 0))
    draw = ImageDraw.Draw(img)

    # Background circle - GoLike red
    draw.ellipse([0, 0, sz - 1, sz - 1], fill=(238, 77, 45, 255))

    # Inner lighter circle for depth
    inner_r = sz // 3
    cx, cy = sz // 2, sz // 2
    draw.ellipse(
        [cx - inner_r, cy - inner_r, cx + inner_r, cy + inner_r],
        fill=(255, 120, 80, 120)
    )

    # Try to draw "GL" text with a font
    try:
        from PIL import ImageFont
        font_paths = [
            '/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf',
            '/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf',
            '/usr/share/fonts/truetype/freefont/FreeSansBold.ttf',
        ]
        font = None
        for fp in font_paths:
            if os.path.exists(fp):
                font = ImageFont.truetype(fp, sz // 3)
                break

        if font:
            text = 'GL'
            bb = draw.textbbox((0, 0), text, font=font)
            tw, th = bb[2] - bb[0], bb[3] - bb[1]
            tx = (sz - tw) // 2 - bb[0]
            ty = (sz - th) // 2 - bb[1]
            draw.text((tx, ty), text, fill='white', font=font)
    except Exception as e:
        print(f'Font error (non-fatal): {e}')

    launcher = f'{d}/ic_launcher.png'
    round_l  = f'{d}/ic_launcher_round.png'
    img.save(launcher)
    img.save(round_l)
    print(f'Created {density}: {sz}x{sz}')

print('All icons generated successfully')
PYEOF

    - name: Create local.properties
      run: |
        echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
        cat local.properties

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Create signing keystore
      run: |
        mkdir -p ~/.android
        keytool -genkey -v \
          -keystore ~/.android/golike.jks \
          -alias golike \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass golike123 \
          -keypass golike123 \
          -dname "CN=GoLike Bot, OU=Bot, O=GoLike, L=VN, S=VN, C=VN" \
          -noprompt

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug \
          --no-daemon \
          --stacktrace \
          -x lint \
          2>&1 | tail -80

    - name: Verify APK exists
      run: |
        APK=$(find . -name "*.apk" -path "*/debug/*" | head -1)
        if [ -z "$APK" ]; then
          echo "ERROR: No APK found!"
          exit 1
        fi
        echo "APK_PATH=$APK" >> $GITHUB_ENV
        echo "Found APK: $APK ($(du -sh "$APK" | cut -f1))"

    - name: Sign APK
      run: |
        zipalign -v -p 4 "$APK_PATH" golike-bot-aligned.apk
        apksigner sign \
          --ks ~/.android/golike.jks \
          --ks-alias golike \
          --ks-pass pass:golike123 \
          --key-pass pass:golike123 \
          --v1-signing-enabled true \
          --v2-signing-enabled true \
          --v3-signing-enabled true \
          --out golike-bot-v9.apk \
          golike-bot-aligned.apk
        ls -lh golike-bot-v9.apk

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: GoLike-Bot-v9-APK
        path: golike-bot-v9.apk
        retention-days: 90

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v9.${{ github.run_number }}"
        name: "GoLike Bot v9.${{ github.run_number }}"
        files: golike-bot-v9.apk
        body: |
          ## GoLike Bot v9 - TikTok + Pause/Resume + Auto Retry

          **Chay tren Android 8.0+ (API 26+)**

          ### Cai dat:
          1. Tai `golike-bot-v9.apk`
          2. Settings -> Install unknown apps -> Bat
          3. Cai dat APK
          4. Cai Termux + `pkg install python`

          ### Tinh nang v9:
          - Ho tro TikTok (them vao Shopee + Lazada)
          - Nut Tam dung / Tiep tuc bot tu Web UI
          - Tu dong thu lai khi mat mang (retry 3 lan)
          - Tu dong khoi dong sau khi reboot thiet bi
          - Gemini AI tu giai captcha (audio + visual)
          - Da tai khoan song song
          - Lich su luu cuc bo (500 jobs gan nhat)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
