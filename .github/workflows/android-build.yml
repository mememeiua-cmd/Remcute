name: Build GoLike Helper APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install required SDK components
      run: |
        yes | sdkmanager --licenses > /dev/null 2>&1 || true
        sdkmanager "platforms;android-34" "build-tools;34.0.0"
        echo "sdk.dir=$ANDROID_HOME" > local.properties

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon -x lint

    - name: Locate APK
      run: |
        APK=$(find . -name "*.apk" -path "*/debug/*" | head -1)
        if [ -z "$APK" ]; then
          echo "ERROR: No APK found!"
          exit 1
        fi
        echo "APK_PATH=$APK" >> $GITHUB_ENV
        echo "Found: $APK ($(du -sh "$APK" | cut -f1))"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: GoLikeHelper-debug-APK
        path: ${{ env.APK_PATH }}
        retention-days: 90

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "build-${{ github.run_number }}"
        name: "GoLike Helper - Build ${{ github.run_number }}"
        files: ${{ env.APK_PATH }}
        body: |
          ## GoLike Helper APK - Android 8.0+ (API 26+)

          ### Cài đặt:
          1. Tải file APK bên dưới
          2. Bật **"Cài từ nguồn không xác định"** trong Cài đặt
          3. Cài APK

          ### Quyền cần cấp:
          - **Accessibility Service** - để click tự động
          - **Overlay** - hiển thị trên ứng dụng khác
          - **Screen Capture** - popup tự động khi nhấn Start

          ### Sử dụng:
          1. Mở app → Cấp quyền Accessibility + Overlay
          2. Nhấn **KHỞI ĐỘNG SERVER**
          3. Server HTTP chạy tại `localhost:7788`
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
