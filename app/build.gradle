plugins {
    id 'com.android.application'
}
android {
    namespace 'com.golikehelper'
    compileSdk 34
    defaultConfig {
        applicationId "com.golikehelper"
        minSdk 26
        targetSdk 34
        versionCode 2
        versionName "1.1"
    }
    signingConfigs {
        release {
            storeFile file(System.getenv("KEYSTORE_PATH") ?: "keystore.jks")
            storePassword System.getenv("KEYSTORE_PASSWORD") ?: "golikehelper123"
            keyAlias System.getenv("KEY_ALIAS") ?: "golikehelper"
            keyPassword System.getenv("KEY_PASSWORD") ?: "golikehelper123"
        }
    }
    buildTypes {
        debug {
            minifyEnabled false
            debuggable true
        }
        release {
            minifyEnabled false
            shrinkResources false
            debuggable false
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}
dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
